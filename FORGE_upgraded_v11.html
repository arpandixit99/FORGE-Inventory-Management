window.storage = {
  set: function(k, v) { _store[k] = v; return Promise.resolve({ key: k, value: v }); },
  get: function(k) { return Promise.resolve(_store[k] !== undefined ? { key: k, value: _store[k] } : null); },
  delete: function(k) { delete _store[k]; return Promise.resolve({ key: k, deleted: true }); }
};

function oAlerts(inv) {
  var result = [];
  for (var i = 0; i < inv.length; i++) {
    var item = inv[i];
    var st = getStatus(item);
    var dl = getDays(item);
    if (st === "critical") {
      result.push({id:uid(), sev:"critical", item:item.name,
        msg: item.qty + " " + item.unit + " — " + (dl===999?"∞":dl+"d") + " left. Below reorder " + item.reorder + ".",
        act: "Order " + getSugQty(item) + " " + item.unit + " from " + item.supplier, t:getNow()});
    } else if (st === "low" && dl <= item.lead + 3) {
      result.push({id:uid(), sev:"warning", item:item.name,
        msg: dl + "d of stock — reorder before delivery.",
        act: "Order " + getSugQty(item) + " " + item.unit + " within 2 days", t:getNow()});
    }
    if (result.length >= 4) break;
  }
  return result;
}

function oSugg(inv) {
  var filtered = inv.filter(function(i) { return getStatus(i) !== "ok" || getDays(i) < 20; });
  filtered.sort(function(a, b) {
    var order = {critical:0, low:1, ok:2};
    return order[getStatus(a)] - order[getStatus(b)];
  });
  return filtered.slice(0, 4).map(function(i) {
    var qty = getSugQty(i);
    return {
      id: uid(), item: i.name,
      urgency: getStatus(i) === "critical" ? "URGENT" : getStatus(i) === "low" ? "SOON" : "PLANNED",
      qty: qty, unit: i.unit,
      reason: i.qty + " " + i.unit + " left — " + (getDays(i)===999?"∞":getDays(i)+"d"),
      cost: parseFloat((qty * i.cost).toFixed(2)),
      supplier: i.supplier, delivery: getDeliv(i)
    };
  });
}

function oChat(msg, inv, mem, bills) {
  var m = msg.toLowerCase();
  function has() { for (var i=0; i<arguments.length; i++) if (m.indexOf(arguments[i]) >= 0) return true; return false; }
  var cr = inv.filter(function(i) { return getStatus(i) === "critical"; });
  var lw = inv.filter(function(i) { return getStatus(i) === "low"; });
  var tv = inv.reduce(function(a,i) { return a + i.qty*i.cost; }, 0);

  if (has("critical","urgent","emergency")) {
    if (!cr.length) return "✓ No critical items. " + lw.length + " items low.";
    return "**" + cr.length + " CRITICAL items:**\n\n" + cr.map(function(i) {
      return "• **" + i.name + "** — " + i.qty + " " + i.unit + ", " + getDays(i) + "d left\n  → Order " + getSugQty(i) + " from " + i.supplier;
    }).join("\n\n");
  }
  if (has("stock","inventory","overview","status")) {
    return "**Inventory: " + inv.length + " items**\n\n• Critical: " + cr.length + "\n• Low: " + lw.length + "\n• OK: " + (inv.length-cr.length-lw.length) + "\n• Total value: " + fmt(tv);
  }
  if (has("order","suggest","restock")) {
    var t = inv.filter(function(i) { return getStatus(i) !== "ok"; });
    if (!t.length) return "✓ No orders needed.";
    return "**" + t.length + " items to order:**\n\n" + t.map(function(i, n) {
      return (n+1) + ". **" + i.name + "** — " + getSugQty(i) + " " + i.unit + " · " + fmt(getSugQty(i)*i.cost);
    }).join("\n");
  }
  if (has("bill","invoice","revenue")) {
    if (!bills.length) return "No invoices yet.";
    var paidRev = bills.filter(function(b){return b.status==="paid";}).reduce(function(a,b){return a+b.total;},0);
    var outstanding = bills.filter(function(b){return b.status==="draft"||b.status==="issued";}).reduce(function(a,b){return a+b.total;},0);
    return "**Billing:**\n\n• " + bills.length + " invoices\n• Revenue: " + fmt(paidRev) + "\n• Outstanding: " + fmt(outstanding);
  }
  if (has("days","runout","stockout")) {
    var sorted = inv.filter(function(i){return i.usage>0;}).sort(function(a,b){return getDays(a)-getDays(b);}).slice(0,5);
    return "**Soonest stockouts:**\n\n" + sorted.map(function(i) { return "• **" + i.name + ":** " + getDays(i) + "d — " + getStatus(i).toUpperCase(); }).join("\n");
  }
  if (has("hello","hi","hey")) {
    return "👋 **FORGE online!**\n\n" + (cr.length ? "⚠ " + cr.length + " critical items!" : "✓ All stable.") + "\n\nAsk: stock · orders · billing · days to stockout";
  }
  var fi = null;
  for (var i = 0; i < inv.length; i++) {
    if (m.indexOf(inv[i].name.toLowerCase()) >= 0) { fi = inv[i]; break; }
  }
  if (fi) {
    return "**" + fi.name + "**\n\n• " + getStatus(fi).toUpperCase() + " | " + fi.qty + " " + fi.unit + " | " + (getDays(fi)===999?"∞":getDays(fi)+"d") + " left\n• " + fi.usage + "/day | Lead " + fi.lead + "d | " + fmt(fi.cost) + "/unit\n• Value: " + fmt(fi.qty*fi.cost) + (getStatus(fi)!=="ok" ? "\n\n→ Order " + getSugQty(fi) + " by " + getDeliv(fi) : "");
  }
  return "**FORGE Brain** — Try:\n• \"What's critical?\" · \"Order suggestions\"\n• \"Stock overview\" · \"Billing\" · Item names";
}

function makeSnap(inv, mem) {

// ── Canvas Background ──
function BG() {
  var canvasRef = useRef(null);
  useEffect(function() {
    var c = canvasRef.current;
    if (!c) return;
    var ctx = c.getContext("2d");
    var aid, t = 0, frame = 0;

    // Sparse floating nodes
    var nodes = [];
    for (var i = 0; i < 28; i++) {
      nodes.push({
        x: Math.random()*1600, y: Math.random()*900,
        vx: (Math.random()-.5)*0.18,
        vy: (Math.random()-.5)*0.18,
        r: Math.random()*1.2+0.4,
        phase: Math.random()*6.28,
        col: [[56,189,248],[129,140,248],[52,211,153]][Math.floor(Math.random()*3)]
      });
    }

    // Vertical scan lines falling slowly
    var scanLines = [];
    function spawnScan(W, H) {
      scanLines.push({
        x: Math.floor(Math.random()*(W/40))*40, // snap to grid columns
        y: -Math.random()*H,
        vy: 0.5 + Math.random()*0.6,
        alpha: 0.12 + Math.random()*0.12,
        col: [[56,189,248],[129,140,248],[52,211,153]][Math.floor(Math.random()*3)],
        h: 60 + Math.random()*120
      });
    }

    // Horizontal sweep line
    var sweepY = 0;

    function draw() {
      var W = c.width = c.offsetWidth;
      var H = c.height = c.offsetHeight;
      ctx.clearRect(0, 0, W, H);
      t += 0.003;
      frame++;

      // 1. Subtle dot grid
      ctx.fillStyle = "rgba(56,189,248,0.08)";
      for (var gx = 0; gx < W; gx += 40) {
        for (var gy = 0; gy < H; gy += 40) {
          ctx.beginPath();
          ctx.arc(gx, gy, 0.8, 0, 6.28);
          ctx.fill();
        }
      }

      // 2. Single slow horizontal sweep line
      sweepY += 0.4;
      if (sweepY > H) sweepY = 0;
      var sg = ctx.createLinearGradient(0, sweepY-60, 0, sweepY+4);
      sg.addColorStop(0, "transparent");
      sg.addColorStop(0.7, "rgba(56,189,248,0.025)");
      sg.addColorStop(1, "rgba(56,189,248,0.06)");
      ctx.fillStyle = sg;
      ctx.fillRect(0, sweepY-60, W, 64);
      // Bright edge line
      ctx.strokeStyle = "rgba(56,189,248,0.12)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, sweepY); ctx.lineTo(W, sweepY); ctx.stroke();

      // 3. Vertical scan lines (slow falling)
      if (frame % 80 === 0 && scanLines.length < 8) spawnScan(W, H);
      scanLines = scanLines.filter(function(s){ return s.y < H + s.h; });
      scanLines.forEach(function(s) {
        s.y += s.vy;
        var sg2 = ctx.createLinearGradient(s.x, s.y, s.x, s.y + s.h);
        sg2.addColorStop(0, "transparent");
        sg2.addColorStop(0.4, "rgba("+s.col[0]+","+s.col[1]+","+s.col[2]+","+s.alpha+")");
        sg2.addColorStop(1, "transparent");
        ctx.strokeStyle = sg2;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.h); ctx.stroke();
      });

      // 4. Node network — sparse connections only when very close
      for (var i = 0; i < nodes.length; i++) {
        for (var j = i+1; j < nodes.length; j++) {
          var dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y;
          var d = Math.sqrt(dx*dx+dy*dy);
          if (d < 130) {
            ctx.strokeStyle = "rgba(56,189,248,"+(0.06*(1-d/130))+")";
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
          }
        }
      }

      // 5. Nodes — tiny, crisp dots with soft pulse
      nodes.forEach(function(n) {
        n.x += n.vx; n.y += n.vy; n.phase += 0.02;
        if (n.x<0||n.x>W) n.vx*=-1;
        if (n.y<0||n.y>H) n.vy*=-1;
        var pulse = Math.sin(n.phase)*0.5+0.5;
        var a = 0.25 + pulse*0.45;
        // Outer glow
        var ng = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*5);
        ng.addColorStop(0,"rgba("+n.col[0]+","+n.col[1]+","+n.col[2]+","+(a*0.25)+")");
        ng.addColorStop(1,"transparent");
        ctx.fillStyle = ng;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*5,0,6.28); ctx.fill();
        // Sharp core dot
        ctx.fillStyle = "rgba("+n.col[0]+","+n.col[1]+","+n.col[2]+","+a+")";
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,6.28); ctx.fill();
      });

      // 6. Corner brackets (techy UI feel)
      var bSize = 18, bAlpha = 0.12;
      [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(function(b) {
        ctx.strokeStyle = "rgba(56,189,248,"+bAlpha+")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(b[0]+b[2]*bSize, b[1]);
        ctx.lineTo(b[0], b[1]);
        ctx.lineTo(b[0], b[1]+b[3]*bSize);
        ctx.stroke();
      });

      aid = requestAnimationFrame(draw);
    }
    draw();
    return function() { cancelAnimationFrame(aid); };
  }, []);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}/>;
}

function Md(props) {

  return (
    <div style={{lineHeight:1.8, fontSize:15}}>
      {text.split("\n").map(function(l, i) {
        var b = l.indexOf("• ") === 0 || l.indexOf("- ") === 0;
        var html = l.replace(/\*\*(.+?)\*\*/g, '<b style="color:#38bdf8">$1</b>') || "&nbsp;";
        return <div key={i} style={{marginBottom:b?3:1,paddingLeft:b?10:0,borderLeft:b?"2px solid rgba(56,189,248,.4)":"none",marginLeft:b?4:0}} dangerouslySetInnerHTML={{__html:html}}/>;
      })}
    </div>
  );
}

function IS(err) {
  return {width:"100%",padding:"8px 10px",background:"rgba(255,255,255,.05)",border:"1px solid "+(err?"#f87171":"rgba(56,189,248,.2)"),borderRadius:6,color:"#e2e8f0",outline:"none",fontFamily:"'Inter','Segoe UI',sans-serif",fontSize:15.5,boxSizing:"border-box"};
}

function Btn(props) {
  var style = Object.assign({cursor:"pointer",fontFamily:"'Inter','Segoe UI',system-ui,sans-serif"}, props.style || {});
  var newProps = Object.assign({}, props, {style: style});
  return <button {...newProps}/>;
}

function LBL(props) {
  var span = props.span || 1;
  return (
    <div style={{gridColumn:"span "+span,display:"flex",flexDirection:"column",gap:4}}>
      <label style={{fontSize:12,color:props.err?"#f87171":"#4a5568",letterSpacing:2,textTransform:"uppercase"}}>{props.l}</label>
      {props.children}
      {props.err && <span style={{fontSize:12,color:"#f87171"}}>{props.err}</span>}
    </div>
  );
}

function App() {
  var _inv = useState(SEED);           var inv = _inv[0],  setInv = _inv[1];

  // FILE UPLOAD PARSER
  var COL_MAP = {
    name:        ["name","item","product","description","itemname","item name"],
    qty:         ["qty","quantity","stock","currentstock","current stock","amount","onhand","on hand"],
    unit:        ["unit","units","uom"],
    reorder:     ["reorder","reorderlevel","reorder level","reorderpoint","reorder point","minstock","min stock","minimum"],
    usage:       ["usage","dailyusage","daily usage","dailyuse","consumption","demand","perday","per day"],
    lead:        ["lead","leadtime","lead time","leadtimedays","lead time days","days","deliverydays","delivery days"],
    supplier:    ["supplier","vendor","manufacturer","source","supplierName","supplier name"],
    cost:        ["cost","costperunit","cost per unit","price","unitprice","unit price","unitcost","unit cost","rate"]
  };

  function normalizeHeader(h) {
    return String(h||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  }

  function mapHeaders(headers) {
    var map = {};
    headers.forEach(function(h, idx) {
      var norm = normalizeHeader(h);
      Object.keys(COL_MAP).forEach(function(field) {
        if (map[field] !== undefined) return;
        COL_MAP[field].forEach(function(alias) {
          if (normalizeHeader(alias) === norm) map[field] = idx;
        });
      });
    });
    return map;
  }

  function rowsToItems(headers, rows) {
    var map = mapHeaders(headers);
    if (map.name === undefined) return null;
    return rows.map(function(row) {
      return {
        name:     String(row[map.name]||"").trim(),
        qty:      N(row[map.qty !== undefined ? map.qty : -1]),
        unit:     String(row[map.unit !== undefined ? map.unit : -1]||"pcs").trim()||"pcs",
        reorder:  N(row[map.reorder !== undefined ? map.reorder : -1]),
        usage:    N(row[map.usage !== undefined ? map.usage : -1]),
        lead:     N(row[map.lead !== undefined ? map.lead : -1],1)||1,
        supplier: String(row[map.supplier !== undefined ? map.supplier : -1]||"").trim(),
        cost:     N(row[map.cost !== undefined ? map.cost : -1])
      };
    }).filter(function(i){ return i.name.length > 0; });
  }

  function parseFile(file) {
    setUploading(true);
    setUploadErr("");
    setUploadRows(null);
    var name = file.name.toLowerCase();
    var isExcel = name.endsWith(".xlsx") || name.endsWith(".xls") || name.endsWith(".ods");
    var isCSV   = name.endsWith(".csv") || name.endsWith(".tsv") || name.endsWith(".txt");

    if (!isExcel && !isCSV) {
      setUploadErr("Unsupported file type. Please use .xlsx, .xls, .csv or .tsv");
      setUploading(false);
      return;
    }

    var reader = new FileReader();

    if (isExcel) {
      reader.onload = function(e) {
        try {
          var data = new Uint8Array(e.target.result);
          var wb = XLSX.read(data, {type:"array"});
          var ws = wb.Sheets[wb.SheetNames[0]];
          var raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
          if (raw.length < 2) { setUploadErr("File is empty or has no data rows."); setUploading(false); return; }
          var headers = raw[0].map(function(h){ return String(h||""); });
          var rows = raw.slice(1).filter(function(r){ return r.some(function(c){ return String(c||"").trim(); }); });
          var items = rowsToItems(headers, rows);
          if (!items || !items.length) { setUploadErr("Could not find a 'name' column. Check your file has the right headers."); setUploading(false); return; }
          setUploadRows({headers:headers, items:items, fileName:file.name});
          setUploading(false);
        } catch(ex) {
          setUploadErr("Failed to read Excel file: "+ex.message);
          setUploading(false);
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      reader.onload = function(e) {
        try {
          var text = e.target.result;
          var sep = text.indexOf("\t") >= 0 ? "\t" : ",";
          var lines = text.trim().split(/\r?\n/).filter(function(l){return l.trim();});
          if (lines.length < 2) { setUploadErr("File is empty or has no data rows."); setUploading(false); return; }
          var headers = lines[0].split(sep).map(function(h){ return h.trim().replace(/^"|"$/g,""); });
          var rows = lines.slice(1).map(function(line){
            var cols = line.split(sep).map(function(c){ return c.trim().replace(/^"|"$/g,""); });
            return cols;
          });
          var items = rowsToItems(headers, rows);
          if (!items || !items.length) { setUploadErr("Could not find a 'name' column. Check your file has the right headers."); setUploading(false); return; }
          setUploadRows({headers:headers, items:items, fileName:file.name});
          setUploading(false);
        } catch(ex) {
          setUploadErr("Failed to read file: "+ex.message);
          setUploading(false);
        }
      };
      reader.readAsText(file);
    }
  }

  function importUploadedRows() {
    if (!uploadRows) return;
    var added = 0, restocked = 0, updatedInv;

    updatedInv = inv.slice();

    uploadRows.items.forEach(function(incoming) {
      var match = updatedInv.findIndex(function(existing) {
        return existing.name.toLowerCase().trim() === incoming.name.toLowerCase().trim();
      });

      if (match >= 0) {
        // ── EXISTING ITEM → restock (add qty) and update any changed fields
        var old = updatedInv[match];
        updatedInv[match] = Object.assign({}, old, {
          qty:      old.qty + (incoming.qty || 0),
          reorder:  incoming.reorder  || old.reorder,
          usage:    incoming.usage    || old.usage,
          lead:     incoming.lead     || old.lead,
          supplier: incoming.supplier || old.supplier,
          cost:     incoming.cost     || old.cost,
          unit:     incoming.unit     || old.unit
        });
        addLog("🔄 Restocked "+incoming.name+" +"+incoming.qty+" → now "+updatedInv[match].qty, "ok");
        logMovement(old.id, incoming.name, "IN", incoming.qty, updatedInv[match].qty, "Excel Import", uploadRows.fileName);
        restocked++;
      } else {
        // ── NEW ITEM → add fresh
        updatedInv.push(Object.assign({}, incoming, {id: nid.current++}));
        addLog("➕ New item added: "+incoming.name+" ("+incoming.qty+")", "ok");
        added++;
      }
    });

    setInv(updatedInv);
    var msg = [];
    if (restocked) msg.push(restocked+" restocked");
    if (added) msg.push(added+" new items");
    showToast("✓ "+msg.join(" · ")+" from "+uploadRows.fileName);

  // BILLING
  function calcTotals(lines) {
    var sub = lines.reduce(function(a,l){ return a + N(l.qty)*N(l.price); }, 0);
    return {sub:sub, tax:sub*TAX, total:sub*(1+TAX)};
  }
  function createInvoice() {
    if (!bform.clientName.trim()) { showToast("Client required","error"); return; }
    var vld = blines.filter(function(l){ return l.name.trim() && N(l.qty)>0 && N(l.price)>0; });
    if (!vld.length) { showToast("Add line items","error"); return; }

    // ── STOCK DEDUCTION & AUTO-ADD ──
    var newInv = inv.slice();
    var deductLogs = [];
    var warnings = [];

    vld.forEach(function(line) {
      var billedQty = N(line.qty);

      if (line.invId) {
        // Linked to existing inventory item — deduct stock
        newInv = newInv.map(function(item) {
          if (String(item.id) === String(line.invId)) {
            var newQty = Math.max(0, item.qty - billedQty);
            deductLogs.push("📦 -"+billedQty+" "+item.name);
            if (newQty <= 0) warnings.push(item.name+" is now OUT OF STOCK!");
            else if (newQty < item.reorder) warnings.push(item.name+" below reorder level ("+newQty+" left)");
            return Object.assign({}, item, {qty: newQty});
          }
          return item;
        });
      } else if (line.name.trim()) {
        // New product not in inventory — auto-add it with qty 0 (just billed out)
        var exists = newInv.find(function(i){ return i.name.toLowerCase()===line.name.trim().toLowerCase(); });
        if (!exists) {
          var newItem = {
            id: nid.current++,
            name: line.name.trim(),
            qty: 0,
            reorder: 10,
            usage: 1,
            lead: 7,
            supplier: "—",
            cost: N(line.price),
            unit: line.unit || "pcs"
          };
          newInv.push(newItem);
          deductLogs.push("➕ "+line.name+" added to inventory");
          warnings.push(line.name+" auto-added to inventory with 0 stock — set reorder level!");
        } else {
          // Exists by name but no invId — deduct anyway
          newInv = newInv.map(function(item) {
            if (item.name.toLowerCase()===line.name.trim().toLowerCase()) {
              var newQty = Math.max(0, item.qty - billedQty);
              deductLogs.push("📦 -"+billedQty+" "+item.name);
              if (newQty <= 0) warnings.push(item.name+" is now OUT OF STOCK!");
              else if (newQty < item.reorder) warnings.push(item.name+" below reorder level ("+newQty+" left)");
              return Object.assign({}, item, {qty: newQty});
            }
            return item;
          });
        }
      }
    });

    // Apply inventory update
    setInv(newInv);

    // Log movements + notifications
    vld.forEach(function(line) {
      var billedQty = N(line.qty);
      var matched = newInv.find(function(i){ return String(i.id)===String(line.invId) || i.name.toLowerCase()===line.name.trim().toLowerCase(); });
      if (matched) {
        logMovement(matched.id, matched.name, "OUT", billedQty, matched.qty, "Billed", "INV-"+(nbill.current));
        if (matched.qty <= 0 || matched.qty < matched.reorder) {
          requestBrowserNotification("⚠ Low Stock: "+matched.name, matched.qty+" "+matched.unit+" remaining — below reorder level");
        }
      }
    });

    // Log each deduction
    deductLogs.forEach(function(l){ addLog(l, "ok"); });

    // Show warnings
    if (warnings.length) {
      warnings.forEach(function(w){ addLog("⚠ "+w, "alert"); });
      showToast("⚠ Stock updated — check alerts!", "warn");
    }

    var totals = calcTotals(vld);
    var bill = Object.assign({}, bform, {
      id:"INV-"+nbill.current++,
      date:new Date().toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}),
      lines:vld, sub:totals.sub, tax:totals.tax, total:totals.total, status:"draft"
    });
    setBills(function(p){ return [bill].concat(p); });
    setBform({clientName:"",clientEmail:"",clientAddress:"",dueDate:"",notes:""});
    setBlines([{invId:"",name:"",qty:1,unit:"pcs",price:0}]);
    setBillingView("list");
    if (!warnings.length) showToast("✓ "+bill.id+" created — stock updated!");
    addLog("🧾 "+bill.id+" · stock auto-deducted","ok");
  }
  function setBS(id, s) {
    setBills(function(p){ return p.map(function(b){ return b.id===id ? Object.assign({},b,{status:s}) : b; }); });
    showToast("→ "+s);

  function receivePO(po) {
    // Mark PO as received and increase inventory
    var updatedInv = inv.slice();
    po.lines.forEach(function(line) {
      var match = updatedInv.findIndex(function(i){ return i.name.toLowerCase()===line.itemName.toLowerCase(); });
      if (match >= 0) {
        var newQty = updatedInv[match].qty + N(line.qty);
        logMovement(updatedInv[match].id, updatedInv[match].name, "IN", N(line.qty), newQty, "PO Received", po.id);
        updatedInv[match] = Object.assign({}, updatedInv[match], {qty: newQty});
        addLog("📦 +"+line.qty+" "+line.itemName+" via "+po.id,"ok");
      } else {
        // New item from PO
        var newItem = {id:nid.current++, name:line.itemName.trim(), qty:N(line.qty), unit:line.unit||"pcs", reorder:10, usage:1, lead:7, supplier:po.supplier, cost:N(line.cost), location:"Main Warehouse"};
        updatedInv.push(newItem);
        logMovement(newItem.id, newItem.name, "IN", N(line.qty), N(line.qty), "PO Received (New Item)", po.id);
        addLog("➕ New item "+line.itemName+" received via "+po.id,"ok");
      }
    });
    setInv(updatedInv);
    setPos(function(p){ return p.map(function(o){ return o.id===po.id ? Object.assign({},o,{status:"received",receivedDate:new Date().toLocaleDateString("en-IN",{year:"numeric",month:"short",day:"numeric"})}) : o; }); });
    showToast("✓ "+po.id+" received — stock updated!");
    requestBrowserNotification("PO Received: "+po.id, po.lines.length+" items added to inventory");
  }

  // BARCODE SCANNER
  function startScanner() {
    setScanOpen(true);
    setScanResult("");
    setTimeout(function() {
      try {
        var hints = new Map();
        var codeReader = new ZXing.BrowserMultiFormatReader(hints);
        scannerRef.current = codeReader;
        codeReader.listVideoInputDevices().then(function(devices) {
          var deviceId = devices.length > 0 ? devices[devices.length-1].deviceId : undefined;
          codeReader.decodeFromVideoDevice(deviceId, videoRef.current, function(result, err) {
            if (result) {
              var code = result.getText();
              setScanResult(code);
              // Try to find item by barcode/name match
              var found = inv.find(function(i){ return i.barcode===code || i.name.toLowerCase().includes(code.toLowerCase()); });
              if (found) {
                setMf(function(p){ return Object.assign({},p,{name:found.name,unit:found.unit,cost:found.cost,supplier:found.supplier}); });
                showToast("✓ Found: "+found.name);
              } else {
                setMf(function(p){ return Object.assign({},p,{name:code}); });
                showToast("Barcode: "+code+" — fill in details","warn");
              }
              stopScanner();
              setView("add");
            }
          });
        });
      } catch(e) {
        showToast("Camera not available","error");
        setScanOpen(false);
      }
    }, 300);
  }

  function stopScanner() {
    if (scannerRef.current) {
      try { scannerRef.current.reset(); } catch(e) {}
      scannerRef.current = null;
    }
    setScanOpen(false);
  }

;color:#111}.total-final{display:flex;justify-content:flex-end;gap:60px;font-size:18px;font-weight:900;color:#111;padding-top:12px;border-top:3px solid #111;margin-top:4px}.total-final span:last-child{min-width:90px;text-align:right}.footer{margin-top:48px;padding-top:20px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#999}.footer strong{color:#111;letter-spacing:2px}.notes-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:14px 16px;margin-bottom:24px;font-size:13px;color:#555;line-height:1.6}@media print{button{display:none!important}}</style></head><body>';

          )}
        </div>
      )}

      {/* HISTORY TAB */}
      {view==="history" && (
        <div style={{flex:1,padding:12,overflowY:"auto",position:"relative",zIndex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:16,fontWeight:800,color:"#38bdf8",letterSpacing:2}}>📈 STOCK MOVEMENT HISTORY</div>
            <div style={{fontSize:13,color:"#2d3748"}}>{movements.length} records</div>
          </div>

          {/* Low stock alerts with email buttons */}
          {inv.filter(function(i){return i.qty<i.reorder;}).length > 0 && (
            <div style={{background:"rgba(251,191,36,.05)",border:"1px solid rgba(251,191,36,.2)",borderRadius:10,padding:12,marginBottom:12}}>
              <div style={{fontSize:13,color:"#fbbf24",fontWeight:800,letterSpacing:2,marginBottom:8}}>⚠ LOW STOCK ALERTS — EMAIL SUPPLIER</div>
              {inv.filter(function(i){return i.qty<i.reorder;}).map(function(item){
                return <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                  <div>
                    <span style={{color:"#fbbf24",fontWeight:700,fontSize:15}}>{item.name}</span>
                    <span style={{color:"#2d3748",fontSize:13,marginLeft:8}}>{item.qty} {item.unit} remaining (reorder at {item.reorder})</span>
                    <span style={{color:"#4a5568",fontSize:13,marginLeft:6}}>· {item.supplier}</span>
                  </div>
                  <Btn onClick={function(){sendLowStockEmail(item);}} style={{padding:"3px 10px",fontSize:13,background:"rgba(251,191,36,.12)",border:"1px solid rgba(251,191,36,.3)",borderRadius:5,color:"#fbbf24",fontWeight:700,flexShrink:0}}>📧 Email</Btn>
                </div>;
              })}
            </div>
          )}

          {/* Filter */}
          <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
            {["all","IN","OUT","ADJUST"].map(function(f){
              return <Btn key={f} onClick={function(){setHistFilter(f);}} style={{padding:"3px 9px",fontSize:12,borderRadius:4,border:"1px solid "+(histFilter===f?"#38bdf8":"rgba(255,255,255,.07)"),background:histFilter===f?"rgba(56,189,248,.1)":"transparent",color:histFilter===f?"#38bdf8":"#2d3748"}}>{f}</Btn>;
            })}
          </div>

          {movements.length===0 && <div style={{textAlign:"center",padding:40,color:"#2d3748",fontSize:15}}>No movements yet. Add items or create invoices to see history here.</div>}

          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
              <thead>
                <tr style={{borderBottom:"1px solid rgba(56,189,248,.12)"}}>
                  {["Date","Item","Type","Qty Change","Balance","Reason","Ref"].map(function(h){
                    return <th key={h} style={{padding:"6px 8px",textAlign:"left",color:"#38bdf8",fontSize:12,letterSpacing:2,fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {movements.filter(function(m){return histFilter==="all"||m.type===histFilter;}).map(function(m){
                  var tcol = m.type==="IN"?"#34d399":m.type==="OUT"?"#f87171":"#fbbf24";
                  return <tr key={m.id} style={{borderBottom:"1px solid rgba(255,255,255,.025)"}}>
                    <td style={{padding:"6px 8px",color:"#2d3748",fontSize:13,whiteSpace:"nowrap"}}>{m.date}</td>
                    <td style={{padding:"6px 8px"}}><b style={{color:"#c7d2fe"}}>{m.itemName}</b></td>
                    <td style={{padding:"6px 8px"}}><span style={{padding:"2px 6px",borderRadius:3,fontSize:11,fontWeight:800,background:tcol+"22",color:tcol}}>{m.type}</span></td>
                    <td style={{padding:"6px 8px",color:tcol,fontWeight:700}}>{m.type==="IN"?"+":m.type==="OUT"?"-":""}{m.qty}</td>
                    <td style={{padding:"6px 8px",color:"#e2e8f0",fontWeight:600}}>{m.balance}</td>
                    <td style={{padding:"6px 8px",color:"#4a5568",fontSize:13}}>{m.reason}</td>
                    <td style={{padding:"6px 8px",color:"#818cf8",fontSize:13}}>{m.ref}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div style={{position:"fixed",bottom:14,left:"50%",transform:"translateX(-50%)",padding:"8px 18px",borderRadius:99,background:toast.type==="error"?"rgba(248,113,113,.95)":toast.type==="warn"?"rgba(251,191,36,.95)":"rgba(52,211,153,.95)",color:"#020917",fontSize:14,fontWeight:800,zIndex:999,boxShadow:"0 6px 28px rgba(0,0,0,.6)",whiteSpace:"nowrap"}}>
          {toast.m}
        </div>
      )}

      {/* FLOAT BRIEFING BTN */}
      {brief && !briefOpen && (
        <Btn onClick={function(){setBriefOpen(true);}} style={{position:"fixed",bottom:14,right:14,padding:"6px 12px",background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.25)",borderRadius:8,color:"#38bdf8",fontSize:13,fontWeight:700,zIndex:90}}>📋 Briefing</Btn>
      )}
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
